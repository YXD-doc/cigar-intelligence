<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>雪茄智能检索系统</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a1a;
            color: #e0e0e0;
            min-height: 100vh;
        }
        
        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }
        
        header {
            text-align: center;
            padding: 40px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 30px;
        }
        
        h1 {
            font-size: 2.5rem;
            background: linear-gradient(45deg, #c9a227, #f4e4ba);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 10px;
        }
        
        .subtitle {
            color: #888;
            font-size: 1rem;
        }
        
        /* 搜索区域 */
        .search-section {
            background: #252525;
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 30px;
        }
        
        .search-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        
        .tab-btn {
            padding: 12px 24px;
            border: none;
            background: #333;
            color: #888;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .tab-btn.active {
            background: #c9a227;
            color: #1a1a1a;
        }
        
        .search-box {
            position: relative;
            margin-bottom: 20px;
        }
        
        .search-input {
            width: 100%;
            padding: 16px 20px;
            font-size: 1.1rem;
            border: 2px solid #444;
            border-radius: 12px;
            background: #1a1a1a;
            color: #e0e0e0;
            outline: none;
            transition: border-color 0.3s;
        }
        
        .search-input:focus {
            border-color: #c9a227;
        }
        
        /* 联想列表 */
        .suggestions {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #333;
            border-radius: 0 0 12px 12px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 100;
            display: none;
        }
        
        .suggestions.active {
            display: block;
        }
        
        .suggestion-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .suggestion-item:hover {
            background: #444;
        }
        
        /* 筛选面板 */
        .filter-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #444;
        }
        
        .filter-group {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        
        .filter-label {
            font-size: 0.9rem;
            color: #888;
        }
        
        .filter-select {
            padding: 10px 14px;
            border: 1px solid #444;
            border-radius: 8px;
            background: #1a1a1a;
            color: #e0e0e0;
            outline: none;
        }
        
        .filter-select:focus {
            border-color: #c9a227;
        }
        
        /* 图片上传 */
        .upload-area {
            border: 2px dashed #444;
            border-radius: 12px;
            padding: 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .upload-area:hover {
            border-color: #c9a227;
        }
        
        .upload-area.dragover {
            background: rgba(201, 162, 39, 0.1);
            border-color: #c9a227;
        }
        
        #fileInput {
            display: none;
        }
        
        /* 结果区域 */
        .results-section {
            margin-top: 30px;
        }
        
        .results-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .results-count {
            color: #888;
        }
        
        .results-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 20px;
        }
        
        .product-card {
            background: #252525;
            border-radius: 12px;
            padding: 20px;
            border: 1px solid #333;
            transition: all 0.3s;
            cursor: pointer;
        }
        
        .product-card:hover {
            border-color: #c9a227;
            transform: translateY(-2px);
        }
        
        .product-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }
        
        .product-name {
            font-size: 1.2rem;
            font-weight: 600;
            color: #f0f0f0;
        }
        
        .product-brand {
            font-size: 0.85rem;
            color: #c9a227;
            margin-top: 4px;
        }
        
        .verified-badge {
            background: #2d5a3d;
            color: #4caf50;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 0.75rem;
        }
        
        .product-info {
            display: flex;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 0.9rem;
            color: #888;
        }
        
        .blend-info {
            background: #1a1a1a;
            border-radius: 8px;
            padding: 12px;
            margin-top: 12px;
        }
        
        .blend-title {
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 8px;
        }
        
        .blend-details {
            display: flex;
            flex-direction: column;
            gap: 4px;
            font-size: 0.9rem;
        }
        
        .blend-item {
            display: flex;
            gap: 8px;
        }
        
        .blend-label {
            color: #666;
            min-width: 40px;
        }
        
        .warning-banner {
            background: rgba(255, 152, 0, 0.1);
            border-left: 3px solid #ff9800;
            padding: 10px 12px;
            margin-top: 12px;
            border-radius: 0 8px 8px 0;
            font-size: 0.85rem;
            color: #ff9800;
        }
        
        /* 置信度指示器 */
        .confidence-bar {
            height: 4px;
            background: #333;
            border-radius: 2px;
            margin-top: 12px;
            overflow: hidden;
        }
        
        .confidence-fill {
            height: 100%;
            border-radius: 2px;
            transition: width 0.3s;
        }
        
        .confidence-high { background: #4caf50; }
        .confidence-medium { background: #ff9800; }
        .confidence-low { background: #f44336; }
        
        /* 历史记录 */
        .history-section {
            background: #252525;
            border-radius: 16px;
            padding: 20px;
            margin-top: 30px;
        }
        
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        
        .clear-btn {
            padding: 6px 12px;
            border: none;
            background: #444;
            color: #888;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.85rem;
        }
        
        .clear-btn:hover {
            background: #f44336;
            color: white;
        }
        
        .history-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .history-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 15px;
            background: #1a1a1a;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .history-query {
            color: #e0e0e0;
        }
        
        .history-meta {
            color: #666;
            font-size: 0.8rem;
        }
        
        /* 加载动画 */
        .loading {
            text-align: center;
            padding: 40px;
        }
        
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #333;
            border-top-color: #c9a227;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        /* 响应式 */
        @media (max-width: 768px) {
            .filter-panel {
                grid-template-columns: 1fr;
            }
            
            .results-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🚬 雪茄智能检索系统</h1>
            <p class="subtitle">模糊搜索 × 图片识别 × 产地筛选</p>
        </header>
        
        <section class="search-section">
            <div class="search-tabs">
                <button class="tab-btn active" data-tab="text">文字搜索</button>
                <button class="tab-btn" data-tab="image">图片识别</button>
                <button class="tab-btn" data-tab="filter">高级筛选</button>
            </div>
            
            <!-- 文字搜索 -->
            <div class="tab-content" id="text-search">
                <div class="search-box">
                    <input type="text" class="search-input" id="searchInput" 
                           placeholder="输入品牌、型号或关键词..." autocomplete="off">
                    <div class="suggestions" id="suggestions"></div>
                </div>
            </div>
            
            <!-- 图片搜索 -->
            <div class="tab-content" id="image-search" style="display:none;">
                <div class="upload-area" id="uploadArea">
                    <p>📷 拖拽图片到此处或点击上传</p>
                    <p style="font-size: 0.85rem; color: #666; margin-top: 10px;">
                        支持 JPG, PNG, WEBP 格式
                    </p>
                    <input type="file" id="fileInput" accept="image/*">
                </div>
                <div id="imagePreview" style="margin-top: 20px;"></div>
            </div>
            
            <!-- 高级筛选 -->
            <div class="tab-content" id="filter-search" style="display:none;">
                <div class="filter-panel">
                    <div class="filter-group">
                        <label class="filter-label">品牌</label>
                        <select class="filter-select" id="brandFilter">
                            <option value="all">全部品牌</option>
                            {% for brand in brands %}
                            <option value="{{ brand.id }}">{{ brand.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">茄衣产地</label>
                        <select class="filter-select" id="wrapperFilter">
                            <option value="all">全部</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">茄套产地</label>
                        <select class="filter-select" id="binderFilter">
                            <option value="all">全部</option>
                        </select>
                    </div>
                    <div class="filter-group">
                        <label class="filter-label">茄芯产地</label>
                        <select class="filter-select" id="fillerFilter">
                            <option value="all">全部</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>
        
        <!-- 结果区域 -->
        <section class="results-section" id="resultsSection" style="display:none;">
            <div class="results-header">
                <h2>搜索结果</h2>
                <span class="results-count" id="resultsCount"></span>
            </div>
            <div class="results-grid" id="resultsGrid"></div>
        </section>
        
        <!-- 历史记录 -->
        <section class="history-section">
            <div class="history-header">
                <h3>📜 最近搜索</h3>
                <button class="clear-btn" onclick="clearHistory()">清空历史</button>
            </div>
            <div class="history-list" id="historyList">
                {% for item in recent_searches %}
                <div class="history-item">
                    <span class="history-query">{{ item.query_content }}</span>
                    <span class="history-meta">{{ item.timestamp[:10] }} · {{ item.results_count }}个结果</span>
                </div>
                {% endfor %}
            </div>
        </section>
    </div>
    
    <script>
        // 全局状态
        let currentTab = 'text';
        let debounceTimer = null;
        
        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            initTabs();
            initSearch();
            initFilters();
            initImageUpload();
        });
        
        // Tab切换
        function initTabs() {
            const tabs = document.querySelectorAll('.tab-btn');
            tabs.forEach(tab => {
                tab.addEventListener('click', () => {
                    tabs.forEach(t => t.classList.remove('active'));
                    tab.classList.add('active');
                    
                    document.querySelectorAll('.tab-content').forEach(c => c.style.display = 'none');
                    document.getElementById(tab.dataset.tab + '-search').style.display = 'block';
                    currentTab = tab.dataset.tab;
                });
            });
        }
        
        // 搜索功能
        function initSearch() {
            const input = document.getElementById('searchInput');
            const suggestions = document.getElementById('suggestions');
            
            input.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                const query = e.target.value.trim();
                
                if (query.length < 1) {
                    suggestions.classList.remove('active');
                    return;
                }
                
                debounceTimer = setTimeout(() => {
                    fetchSuggestions(query);
                }, 300);
            });
            
            input.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') {
                    suggestions.classList.remove('active');
                    performSearch(input.value);
                }
            });
            
            document.addEventListener('click', (e) => {
                if (!e.target.closest('.search-box')) {
                    suggestions.classList.remove('active');
                }
            });
        }
        
        // 获取搜索建议
        async function fetchSuggestions(query) {
            try {
                const res = await fetch(`/api/suggest?q=${encodeURIComponent(query)}`);
                const data = await res.json();
                
                const suggestions = document.getElementById('suggestions');
                suggestions.innerHTML = '';
                
                data.suggestions.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'suggestion-item';
                    div.textContent = item.name;
                    div.onclick = () => {
                        document.getElementById('searchInput').value = item.name;
                        suggestions.classList.remove('active');
                        performSearch(item.name);
                    };
                    suggestions.appendChild(div);
                });
                
                if (data.suggestions.length > 0) {
                    suggestions.classList.add('active');
                }
            } catch (err) {
                console.error('Error fetching suggestions:', err);
            }
        }
        
        // 执行搜索
        async function performSearch(query) {
            if (!query) return;
            
            const brand = document.getElementById('brandFilter')?.value || '';
            const wrapper = document.getElementById('wrapperFilter')?.value || '';
            const binder = document.getElementById('binderFilter')?.value || '';
            const filler = document.getElementById('fillerFilter')?.value || '';
            
            showLoading();
            
            try {
                const params = new URLSearchParams({
                    q: query,
                    limit: '10'
                });
                if (brand && brand !== 'all') params.append('brand', brand);
                if (wrapper && wrapper !== 'all') params.append('wrapper', wrapper);
                if (binder && binder !== 'all') params.append('binder', binder);
                if (filler && filler !== 'all') params.append('filler', filler);
                
                const res = await fetch(`/api/search?${params}`);
                const data = await res.json();
                
                displayResults(data);
                loadHistory();
            } catch (err) {
                console.error('Error searching:', err);
            }
        }
        
        // 初始化筛选器
        async function initFilters() {
            try {
                const res = await fetch('/api/filters/options');
                const data = await res.json();
                
                // 填充产地选项
                const origins = data.origins;
                
                const wrapperSelect = document.getElementById('wrapperFilter');
                const binderSelect = document.getElementById('binderFilter');
                const fillerSelect = document.getElementById('fillerFilter');
                
                origins.wrapper.forEach(o => {
                    wrapperSelect.add(new Option(o, o));
                });
                origins.binder.forEach(o => {
                    binderSelect.add(new Option(o, o));
                });
                origins.filler.forEach(o => {
                    fillerSelect.add(new Option(o, o));
                });
                
                // 绑定筛选变化事件
                [wrapperSelect, binderSelect, fillerSelect].forEach(select => {
                    select.addEventListener('change', () => {
                        const query = document.getElementById('searchInput').value;
                        if (query) performSearch(query);
                    });
                });
                
            } catch (err) {
                console.error('Error loading filters:', err);
            }
        }
        
        // 图片上传
        function initImageUpload() {
            const uploadArea = document.getElementById('uploadArea');
            const fileInput = document.getElementById('fileInput');
            
            uploadArea.addEventListener('click', () => fileInput.click());
            
            uploadArea.addEventListener('dragover', (e) => {
                e.preventDefault();
                uploadArea.classList.add('dragover');
            });
            
            uploadArea.addEventListener('dragleave', () => {
                uploadArea.classList.remove('dragover');
            });
            
            uploadArea.addEventListener('drop', (e) => {
                e.preventDefault();
                uploadArea.classList.remove('dragover');
                const files = e.dataTransfer.files;
                if (files.length > 0) {
                    handleImageUpload(files[0]);
                }
            });
            
            fileInput.addEventListener('change', (e) => {
                if (e.target.files.length > 0) {
                    handleImageUpload(e.target.files[0]);
                }
            });
        }
        
        async function handleImageUpload(file) {
            const formData = new FormData();
            formData.append('file', file);
            
            showLoading();
            
            try {
                const res = await fetch('/api/recognize', {
                    method: 'POST',
                    body: formData
                });
                const data = await res.json();
                
                displayImageResults(data);
                loadHistory();
            } catch (err) {
                console.error('Error uploading image:', err);
            }
        }
        
        // 显示搜索结果
        function displayResults(data) {
            const section = document.getElementById('resultsSection');
            const count = document.getElementById('resultsCount');
            const grid = document.getElementById('resultsGrid');
            
            section.style.display = 'block';
            count.textContent = `找到 ${data.total} 个结果`;
            grid.innerHTML = '';
            
            data.results.forEach(item => {
                const card = createProductCard(item);
                grid.appendChild(card);
            });
            
            section.scrollIntoView({ behavior: 'smooth' });
        }
        
        // 显示图片识别结果
        function displayImageResults(data) {
            const preview = document.getElementById('imagePreview');
            preview.innerHTML = `<img src="${data.image_url}" style="max-width: 300px; border-radius: 8px;">`;
            
            const section = document.getElementById('resultsSection');
            const count = document.getElementById('resultsCount');
            const grid = document.getElementById('resultsGrid');
            
            section.style.display = 'block';
            count.textContent = `图片识别结果`;
            grid.innerHTML = '';
            
            data.matches.forEach(match => {
                const item = {
                    ...match,
                    match_score: match.score,
                    blend: match.blend
                };
                const card = createProductCard(item, true);
                grid.appendChild(card);
            });
        }
        
        // 创建产品卡片
        function createProductCard(item, isImageResult = false) {
            const card = document.createElement('div');
            card.className = 'product-card';
            
            let confidenceHtml = '';
            if (isImageResult) {
                const confidenceClass = item.score >= 90 ? 'confidence-high' : 
                                       item.score >= 70 ? 'confidence-medium' : 'confidence-low';
                confidenceHtml = `
                    <div style="margin-top: 10px;">
                        <div style="display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 4px;">
                            <span>匹配置信度</span>
                            <span>${item.confidence}</span>
                        </div>
                        <div class="confidence-bar">
                            <div class="confidence-fill ${confidenceClass}" style="width: ${item.score}%"></div>
                        </div>
                    </div>
                `;
            }
            
            let reasonsHtml = '';
            if (isImageResult && item.reasons && item.reasons.length > 0) {
                reasonsHtml = `
                    <div style="margin-top: 10px; font-size: 0.85rem; color: #888;">
                        匹配依据: ${item.reasons.join(', ')}
                    </div>
                `;
            }
            
            const warningHtml = item.warning ? `
                <div class="warning-banner">${item.warning}</div>
            ` : '';
            
            card.innerHTML = `
                <div class="product-header">
                    <div>
                        <div class="product-name">${item.name}</div>
                        <div class="product-brand">${item.brand} · ${item.series}</div>
                    </div>
                    ${item.verified ? '<span class="verified-badge">✓ 已核实</span>' : ''}
                </div>
                <div class="product-info">
                    <span>📏 ${item.size || '尺寸未知'}</span>
                    <span>💰 ${item.price || '价格未知'}</span>
                    <span>🏷️ ${item.type || '类型未知'}</span>
                </div>
                <div class="blend-info">
                    <div class="blend-title">配方组成</div>
                    <div class="blend-details">
                        <div class="blend-item">
                            <span class="blend-label">茄衣</span>
                            <span>${item.blend.wrapper}</span>
                        </div>
                        <div class="blend-item">
                            <span class="blend-label">茄套</span>
                            <span>${item.blend.binder}</span>
                        </div>
                        <div class="blend-item">
                            <span class="blend-label">茄芯</span>
                            <span>${item.blend.filler}</span>
                        </div>
                    </div>
                </div>
                ${warningHtml}
                ${confidenceHtml}
                ${reasonsHtml}
            `;
            
            card.onclick = () => showProductDetail(item.id);
            
            return card;
        }
        
        // 加载历史记录
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const data = await res.json();
                
                const list = document.getElementById('historyList');
                list.innerHTML = '';
                
                data.recent.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'history-item';
                    div.innerHTML = `
                        <span class="history-query">${item.query_content}</span>
                        <span class="history-meta">${item.timestamp.slice(0, 10)} · ${item.results_count}个结果</span>
                    `;
                    div.onclick = () => {
                        if (item.query_type === 'text') {
                            document.getElementById('searchInput').value = item.query_content;
                            performSearch(item.query_content);
                        }
                    };
                    list.appendChild(div);
                });
            } catch (err) {
                console.error('Error loading history:', err);
            }
        }
        
        // 清空历史
        async function clearHistory() {
            if (!confirm('确定要清空搜索历史吗？')) return;
            
            try {
                await fetch('/api/history', { method: 'DELETE' });
                loadHistory();
            } catch (err) {
                console.error('Error clearing history:', err);
            }
        }
        
        // 显示产品详情
        async function showProductDetail(productId) {
            try {
                const res = await fetch(`/api/product/${productId}`);
                const data = await res.json();
                
                alert(JSON.stringify(data, null, 2));
            } catch (err) {
                console.error('Error loading product:', err);
            }
        }
        
        // 显示加载状态
        function showLoading() {
            const grid = document.getElementById('resultsGrid');
